
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>WarKlas AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-vibrant-violet: #8b5cf6;
      --color-electric-purple: #a855f7;
      --color-deep-indigo: #1e1b4b;
      --color-midnight: #020617;
    }

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: var(--color-midnight);
      height: 100vh;
      width: 100vw;
    }

    .bg-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
      background: linear-gradient(180deg, #1e1b4b 0%, #020617 100%);
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.5;
      will-change: transform;
    }

    .blob-1 {
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, var(--color-electric-purple) 0%, transparent 70%);
      top: -10%;
      left: -10%;
      animation: drift 25s infinite alternate ease-in-out;
    }

    .blob-2 {
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, #3b82f6 0%, transparent 70%);
      bottom: -10%;
      right: -5%;
      animation: drift 35s infinite alternate-reverse ease-in-out;
    }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(5vw, 5vh) scale(1.1); }
    }

    .noise {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .glass {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .glass-dark {
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    #root { 
      height: 100%; 
      width: 100%; 
      position: relative; 
      z-index: 10; 
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "@google/genai": "https://esm.sh/@google/genai@1.40.0",
    "framer-motion": "https://esm.sh/framer-motion@12.0.0?external=react,react-dom",
    "lucide-react": "https://esm.sh/lucide-react@0.475.0?external=react",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="text-gray-100">
  <div class="bg-container">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>
  <div class="noise"></div>
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
